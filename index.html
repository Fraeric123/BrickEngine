<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreeJS Engine FPS</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b1020;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <script type="module">

        import {
            BrickEngine,
            GameMap
        } from './brickengine.js';

        class MyMap extends GameMap {
            init() {
                super.init();
                this.scene.background = new this.engine.THREE.Color(0x444488);

                const ambientLight = new this.engine.THREE.AmbientLight(0xffffff, 0.5);
                this.scene.add(ambientLight);

                const directionalLight = new this.engine.THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(5, 10, 7);
                this.scene.add(directionalLight);

                const geometry = new this.engine.THREE.BoxGeometry(1, 1, 1);
                const material = new this.engine.THREE.MeshStandardMaterial({ color: 0x00ff00 });
                const cube = new this.engine.THREE.Mesh(geometry, material);

                cube.position.set(0, 0, 0);
                this.scene.add(cube);

                console.log("Mapa inicializována s kostkou.");
            }
        }

        let engine = new BrickEngine();

        engine.init({

            display_mode: 'normal_canvas'

        }).then(() => {

            engine.add_map("map1", MyMap);
            engine.set_map("map1");
            engine.start();

        });

    </script>
</body>

</html>
