<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrickEngine - Ultimate Test</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            pointer-events: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #777;
        }
    </style>
</head>

<body>

    <script type="module">
        import * as THREE from './libs/three.module.js';
        import {
            BrickEngine, GameMap, BasePart,
            InteractDetector,
            JSScript, Folder,
            Lighting, Material,
            Sky
        } from './brickengine.js';

        class DemoMap extends GameMap {
            init() {
                super.init();
                const engine = this.engine;

                this.findFirstChild("Lighting")
                    .set("sunColor", 0xfffaf0)
                    .set("sunIntensity", 7.0)
                    .set("sunPosition", new THREE.Vector3(20, 50, 10))
                    .set("ambientIntensity", 0.3)

                const sky = new Sky(engine);
                sky.set("hdri", "sky");
                sky.set("exposure", 0.7);
                this.findFirstChild("Lighting").addChild(sky);

                this.add(new BasePart(engine)
                    .set_name("Baseplate")
                    .set_size(200, 1, 200)
                    .set_position(0, -0.5, 0)
                    .set_color(0xffffff)
                    .set_anchored(true)
                    .set_material("debug_orange")
                );

                const button = new BasePart(engine)
                    .set_size(2, 2, 2)
                    .set_position(10, 1, 0)
                    .set_anchored(true)
                    .set_color(0xffffff)
                    .set_material("debug_red")
                    .set_name("Button");

                const detector = new InteractDetector(engine);
                detector.onInteract = () => {
                    button.set_color(Math.random() * 0xffffff);
                    const drop = new BasePart(engine)
                        .set_size(1, 1, 1)
                        .set_position(10, 10, 0)
                        .set_color(0xffffff)
                        .set_anchored(false)
                        .set_material("debug_purple")
                        .set_name("Drop");
                    this.add(drop);
                };
                button.addChild(detector);
                this.add(button);

                const spinner = new BasePart(engine)
                    .set_size(4, 0.5, 4)
                    .set_position(-10, 2, -10)
                    .set_color(0xffffff)
                    .set_anchored(true)
                    .set_material("debug_green")
                    .set_name("Spinner");

                const script = new JSScript(engine);
                script.script = {
                    update: (script, dt) => {
                        script.parent.set_angular_velocity(0, 200 * dt, 0);
                    }
                };
                spinner.addChild(script);
                this.add(spinner);

                const folder = new Folder(engine);
                for (let i = 0; i < 20; i++) {
                    const p = new BasePart(engine)
                        .set_position(Math.random() * 4 - 2, 10 + i, Math.random() * 4 - 2)
                        .set_anchored(false)
                        .set_color(0xffffff)
                        .set_material("debug_purple")
                        .set_name(`Part_${i}`);
                    folder.addChild(p);
                }
                this.add(folder);
            }

            update(dt) {
                super.update(dt);
            }
        }

        const engine = new BrickEngine();

        engine.add_texture("debug_orange", "./assets/debug/Orange/texture_01.png")
            .add_texture("debug_red", "./assets/debug/Red/texture_01.png")
            .add_texture("debug_purple", "./assets/debug/Purple/texture_01.png")
            .add_texture("debug_green", "./assets/debug/Green/texture_01.png")
            .add_hdri("sky", "./assets/sky/cloudy.hdr")

        engine.add_material(new Material(engine, "debug_orange")
            .set("roughness", 0.1)
            .set("metalness", 0.1)
            .set("uvScale", new THREE.Vector2(20, 20))
            .set("uvOffset", new THREE.Vector2(0, 0)))
            .get_material("debug_orange").properties.textures.albedo = "debug_orange"

        engine.add_material(new Material(engine, "debug_red")
            .set("roughness", 0.1)
            .set("metalness", 0.1)
            .set("uvScale", new THREE.Vector2(1, 1))
            .set("uvOffset", new THREE.Vector2(0, 0)))
            .get_material("debug_red").properties.textures.albedo = "debug_red";

        engine.add_material(new Material(engine, "debug_purple")
            .set("roughness", 0.1)
            .set("metalness", 0.1)
            .set("uvScale", new THREE.Vector2(1, 1))
            .set("uvOffset", new THREE.Vector2(0, 0)))
            .get_material("debug_purple").properties.textures.albedo = "debug_purple";

        engine.add_material(new Material(engine, "debug_green")
            .set("roughness", 0.1)
            .set("metalness", 0.1)
            .set("uvScale", new THREE.Vector2(1, 1))
            .set("uvOffset", new THREE.Vector2(0, 0)))
            .get_material("debug_green").properties.textures.albedo = "debug_green";

        engine.init({
            display_mode: 'normal_canvas'            
        }).then(() => {
            engine.postProcessEnabled = true;
            engine.add_map("main_test", DemoMap);
            engine.set_map("main_test").start();
        });
    </script>
</body>

</html>
