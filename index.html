<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreeJS Engine FPS</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b1020;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <script type="module">

        import {
            BrickEngine,
            World
        } from './brickengine.js';

        let engine = new BrickEngine();

        engine.init({

            display_mode: 'normal_canvas'

        }).then(() => {

            engine.add_world("start_world", World);
            engine.set_world("start_world");
            engine.start();
            
        });

    </script>
</body>

</html>
